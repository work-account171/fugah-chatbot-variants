<!-- =============================================
     Fugah Chatbot Widget - Salla Partner App
     Embed snippet for merchant stores
     =============================================
     Usage:
     1. Host widget files on your CDN at the same base URL (e.g. https://cdn.yourdomain.com/widget/v1/)
        Required files: widget.js, widget.css, ui.html, and assets/* (all under that base URL).
     2. Replace YOUR_CDN_BASE_URL below with that base URL (no trailing slash).
     3. Add this snippet in Salla Partner Portal → Your App → App Snippets.
     4. Use data-store-id from your app (e.g. from OAuth/store context) so each merchant gets their ID.
     ============================================= -->

<script
  src="https://fugah-chatbot-variants.vercel.app/widget.js"
  charset="UTF-8"
  data-store-id="{{store_id}}"
  data-theme="green">
</script>
